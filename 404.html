<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 - Page Not Found</title>
  <style>
    :root {
      color-scheme: light;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, Helvetica, sans-serif;
      background: #f0f0f0;
      color: #111;
      padding: 24px;
    }
    .card {
      width: min(560px, 100%);
      background: #fff;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      padding: 28px 24px;
      text-align: center;
    }
    h1 {
      margin: 0;
      font-size: 56px;
      line-height: 1;
      color: #023e8a;
    }
    h2 {
      margin: 10px 0 8px;
      font-size: 24px;
    }
    p {
      margin: 0;
      color: #4b5563;
      font-size: 15px;
    }
    a {
      display: inline-block;
      margin-top: 18px;
      text-decoration: none;
      color: #fff;
      background: #023e8a;
      border-radius: 999px;
      padding: 10px 18px;
      font-weight: 700;
    }
    a:hover { opacity: 0.92; }
  </style>
</head>
<body>
  <main class="card">
    <h1>404</h1>
    <h2>Page Not Found</h2>
    <p>The page you requested is unavailable.</p>
    <a href="/deployment/">Go to WhiteCoat</a>
  </main>
</body>
</html>
